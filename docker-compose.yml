services:
  mariadb:
    image: mariadb:11.4
    container_name: aurilearn-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root-welcome-123
      MARIADB_DATABASE: aurilearn_chatbot
      MARIADB_USER: vaibhav
      MARIADB_PASSWORD: Welcome@123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/chatbot_schema.sql:/docker-entrypoint-initdb.d/01-chatbot-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mariadb_data:
